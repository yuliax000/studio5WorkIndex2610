<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <title>Information Design Experiment</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />

    <link rel="stylesheet" href="infoDesignReset.css" />
    <link rel="stylesheet" href="infoDesignStyle.css" />
    <link rel="stylesheet" href="keyboardControllerStyle.css" />

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js"
      integrity="sha512-F1myjNkIKU5XJtOs1HXRo/zOjiUsABgFEEGKLx/riwK82jRThZFebEnfF2HWo9eeC+iC1Nwwnn9Vj6OGq+r7rQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="main.js" defer></script>
    <script src="keyboardController.js" defer></script>
  </head>
  <body>
    <dialog id="intro-dialog">
      <p>Hey this page wants to make some noise, is that OK?</p>
      <button id="dialog-close-button" autofocus>That's OK</button>
    </dialog>

    <main>
      <h1>Information Design Experiment</h1>

      <!-- !!!! -->
      <!-- These are the three range elements we will be working on for this exercise -->
      <div class="sliderContainer">
        <div class="iconContainer">
          <span>🔉</span>
          <input
            type="range"
            id="var1Range"
            min="-48"
            max="0"
            step="1"
            value="1"
          />
          <span>🔉</span>
        </div>

        <label for="var1Range">volume</label>
        <div class="spacer1"></div>

        <!-- I've tried walking and running to show the information of speed, but it doesn't show the feeling of loop... -->
        <!-- I feel like the filter has  -->
        <!-- <div class="iconContainer2">
          <span>🚶‍➡️</span>
          <input
            type="range"
            id="var2Range"
            min="1"
            max="25"
            step="1"
            value="5"
          />
          <span>🏃‍➡️</span>
        </div> -->

        <!-- I prefer using simple geometric shapes to represent information because they are intuitive and minimal. Geometric forms also fit well with the visual style of this page. 
            The blink design can catch the attention easily, which can be slightly distracting. 
            Moreover, I feel it provides a little ambiguity for users-->
        <div class="iconContainer2">
          <span class="dotSlowContainer">
            <div class="dotSlow"></div>
          </span>
          <input
            type="range"
            id="var2Range"
            min="1"
            max="25"
            step="1"
            value="5"
          />
          <span class="dotFastContainer">
            <div class="dotFast"></div>
          </span>
        </div>

        <label for="var2Range"></label>

        <div class="spacer"></div>

        <!-- I try to use a symbol, which is under the range slider, to show the entire change of the slider  -->
        <!-- Using only one symbol helps create a sense of continuity as the range changes. -->
        <div class="sliderContainer3">
          <input
            type="range"
            id="var3Range"
            min="1"
            max="100"
            step="1"
            value="1"
          />
        </div>

        <label for="var3Range">▁▁▂▂▃▃▄▄▅▅▆▆</label>
      </div>

      <!-- !!!! -->

      <!--
        This is a template for a keyboard controller : we will look at building this style of
        input in class, but feel free to reference my code patter. I've modularised the CSS &
        JS portions into their own file, but they rely on an HTML structure like that below.
        -->
      <div class="keyboardContainer">
        <div class="octaveContainer" data-octave="3">
          <div class="whiteKeyContainer">
            <button class="whiteKey" data-note="c"></button>
            <button class="whiteKey" data-note="d"></button>
            <button class="whiteKey" data-note="e"></button>
            <button class="whiteKey" data-note="f"></button>
            <button class="whiteKey" data-note="g"></button>
            <button class="whiteKey" data-note="a"></button>
            <button class="whiteKey" data-note="b"></button>
          </div>
          <div class="blackKeyContainer">
            <div class="blackKeySpacer"></div>
            <button class="blackKey" data-note="c#"></button>
            <button class="blackKey" data-note="d#"></button>
            <div class="blackKeySpacer"></div>
            <div class="blackKeySpacer"></div>
            <button class="blackKey" data-note="f#"></button>
            <button class="blackKey" data-note="g#"></button>
            <button class="blackKey" data-note="a#"></button>
            <div class="blackKeySpacer"></div>
          </div>
        </div>

        <div class="octaveContainer" data-octave="4">
          <div class="whiteKeyContainer">
            <button class="whiteKey" data-note="c"></button>
            <button class="whiteKey" data-note="d"></button>
            <button class="whiteKey" data-note="e"></button>
            <button class="whiteKey" data-note="f"></button>
            <button class="whiteKey" data-note="g"></button>
            <button class="whiteKey" data-note="a"></button>
            <button class="whiteKey" data-note="b"></button>
          </div>
          <div class="blackKeyContainer">
            <div class="blackKeySpacer"></div>
            <button class="blackKey" data-note="c#"></button>
            <button class="blackKey" data-note="d#"></button>
            <div class="blackKeySpacer"></div>
            <div class="blackKeySpacer"></div>
            <button class="blackKey" data-note="f#"></button>
            <button class="blackKey" data-note="g#"></button>
            <button class="blackKey" data-note="a#"></button>
            <div class="blackKeySpacer"></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
